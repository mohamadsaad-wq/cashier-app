<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Calculator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container rtl" id="mainContainer">
        <div class="top-row">
            <div class="lang-dropdown">
                <i class="fas fa-globe"></i>
                <select id="langSelect" onchange="changeLanguage()">
                    <option value="ar" selected>AR</option>
                    <option value="en">EN</option>
                </select>
            </div>
            <h2 id="title">Currency Calculator</h2>
        </div>

        <label id="labelTotal">التكلفة الإجمالية (ل.س)</label>
        <input type="text" id="totalCost" placeholder="0" oninput="handleInput(this)">

        <label id="labelPaid">المبلغ المدفوع ($)</label>
        <input type="text" id="paidUSD" placeholder="0" oninput="handleInput(this)">

        <div id="changeArea"></div>
        <div id="totalPaidArea"></div>

        <button class="details-btn" id="btnDetails" onclick="toggleDetails()">المزيد من التفاصيل</button>
        
        <div id="settingsArea" class="hidden-details" style="display: none;">
            <p><strong id="labelInternal">سعر الشراء الداخلي:</strong> <span id="internalValue">0</span></p>
            <hr style="margin: 8px 0; border: 0; border-top: 1px solid #eee;">
            
            <label id="labelMarket">سعر السوق</label>
            <input type="text" id="marketBuy" value="11,400" oninput="handleInput(this)">

            <label id="labelMargin">الهامش (%)</label>
            <select id="margin" onchange="calculate()">
                <option value="0" selected>0%</option>
                <option value="1">1%</option>
                <option value="2">2%</option>
                <option value="3">3%</option>
                <option value="4">4%</option>
                <option value="5">5%</option>
            </select>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
