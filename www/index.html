<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Calculator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container rtl" id="mainContainer">
        <div class="top-row">
            <div class="lang-dropdown">
                <i class="fas fa-globe"></i>
                <select id="langSelect" onchange="changeLanguage()">
                    <option value="ar" selected>AR</option>
                    <option value="en">EN</option>
                </select>
            </div>
            <h2 id="title">Currency Calculator</h2>
            <button class="reset-btn" onclick="resetAll()"><i class="fas fa-undo"></i></button>
        </div>

        <label id="labelTotal">التكلفة الإجمالية (ل.س)</label>
        <input type="text" id="totalCost" placeholder="0" oninput="handleInput(this)">

        <label id="labelPaid">المبلغ المدفوع ($)</label>
        <input type="text" id="paidUSD" placeholder="0" oninput="handleInput(this)">

        <div id="changeArea"></div>
        <div id="totalPaidArea"></div>

        <label id="labelMarketView">سعر الصرف المعتمد حالياً</label>
        <input type="text" id="marketViewOnly" disabled style="background-color: #eee; color: #888;">

        <button class="details-btn" id="btnDetails" onclick="tryAccessAdmin()">المزيد من التفاصيل</button>
        
        <div id="adminPanel" class="admin-box" style="display: none;">
            <div class="admin-header">
                <span id="adminTitle">إعدادات الإدارة</span>
            </div>
            <p><strong id="labelInternal">سعر الشراء الداخلي:</strong> <span id="internalValue">0</span></p>
            <p class="profit-text"><strong id="labelProfit">ربح الصرافة:</strong> <span id="profitValue">0</span></p>
            <hr>
            <label id="labelMarketEdit">تعديل سعر السوق</label>
            <input type="text" id="marketBuy" oninput="handleInput(this)">
            <label id="labelReal">سعر الصرف الحقيقي (خفي)</label>
            <input type="text" id="realRate" oninput="handleInput(this)">
            <label id="labelMargin">الهامش (%)</label>
            <select id="margin" onchange="calculate()">
                <option value="0">0%</option>
                <option value="1">1%</option>
                <option value="2">2%</option>
                <option value="3">3%</option>
                <option value="5">5%</option>
            </select>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
